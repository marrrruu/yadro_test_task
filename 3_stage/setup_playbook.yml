---
- name: Docker install and container run
  hosts: all
  become: yes 
  
  vars:
    app_dir: /opt/docker_app
    container_name: http-script-container
    image_name: http-script-image
    distro_map:
      Kali: debian
    release_map:
      kali-rolling: bookworm
    target_user: "{{ ansible_facts['env']['SUDO_USER'] | default(ansible_facts['env']['USER']) | default(lookup('env', 'USER')) }}"

  tasks:
    - name: (Debian) Install dependencies 
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: (Debian) Make directory for key 
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
      when: ansible_facts['os_family'] == "Debian"

    - name: (Debian) Identify host OS 
      set_fact:
        docker_distro: "{{ distro_map[ansible_facts['distribution']] | default(ansible_facts['distribution'] | lower) }}"
        docker_release: "{{ release_map[ansible_facts['distribution_release']] | default(ansible_facts['distribution_release']) }}"
      when: ansible_facts['os_family'] == "Debian"

    - name: (Debian) Download Docker key
      shell: |
        curl -fsSL https://download.docker.com/linux/{{ docker_distro }}/gpg | gpg --dearmor --yes -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg
      when: ansible_facts['os_family'] == "Debian"

    - name: (Debian) Create Docker repo 
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/{{ docker_distro }} {{ docker_release }} stable"
        state: present
        filename: docker
        update_cache: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: (RedHat) Install dependencies 
      yum:
        name: yum-utils
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    - name: (RedHat) Add Docker repo 
      command: yum-config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
      args:
        creates: /etc/yum.repos.d/docker-ce.repo
      when: ansible_facts['os_family'] == "RedHat"

    - name: Remove conflicting Docker packages
      package:
        name:
          - docker.io
          - docker-doc
          - docker-compose
          - podman-docker
          - containerd
          - runc
        state: absent
      ignore_errors: yes

    - name: Install Docker
      package:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Add current user to docker group
      user:
        name: "{{ target_user }}"
        groups: docker
        append: yes

    - name: Run docker.service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Check Docker install
      command: docker --version
      register: docker_version
      
    - name: Create work directory
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy dockerfile, script and requirements
      copy:
        src: "{{ item }}"
        dest: "{{ app_dir }}/"
      loop:
        - Dockerfile
        - http_script.py
        - requirements.txt 

    - name: Build docker-image
      command: docker build -t {{ image_name }} .
      args:
        chdir: "{{ app_dir }}"

    - name: Remove old container
      command: docker rm -f {{ container_name }}
      ignore_errors: yes
      changed_when: false

    - name: Run container
      command: docker run --name {{ container_name }} {{ image_name }}
      register: run_result
      ignore_errors: yes

    - name: Verify script execution status (exit code 0)
      fail:
        msg: "Error. Return code: {{ run_result.rc }}"
      when: run_result.rc != 0

    - name: Get logs from dockerlogs
      command: docker logs {{ container_name }}
      register: container_logs
      changed_when: false

    - name: Write docker logs
      debug:
        msg: "{{ container_logs.stdout_lines + container_logs.stderr_lines }}"